    <title>Estudio E - Interiorismo y Reformas Profesionales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            max-width: 100%;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        /* En móvil, el vídeo ocupa toda la pantalla */
        @media (max-width: 768px) {
            video {
                width: 100%;
                height: 100vh;
                object-fit: cover;
            }
        }

        /* En desktop, limitamos el ancho para que se vea como un móvil */
        @media (min-width: 769px) {
            .video-container {
                position: relative;
                max-width: 600px;
                margin: 0 auto;
            }

            .video-bg {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(1.2);
                width: 100%;
                height: 100%;
                filter: blur(35px) brightness(0.5);
                z-index: 0;
                border-radius: 12px;
                overflow: hidden;
            }

            .video-bg video {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            #videoPlayer {
                position: relative;
                max-height: 90vh;
                border-radius: 12px;
                box-shadow: 0 30px 100px rgba(0, 0, 0, 0.9);
                z-index: 1;
            }
        }


    </style>
</head>
<body>
    <h1 style="position: absolute; width: 1px; height: 1px; overflow: hidden;">Estudio E - Interiorismo y Reformas Profesionales</h1>
    <main>
        <div class="video-container">
            <div class="video-bg">
                <video playsinline muted loop aria-label="Presentación de Estudio E">
                    <source src="preview.mp4" type="video/mp4">
                </video>
            </div>
            <video id="videoPlayer" playsinline autoplay muted loop aria-label="Video principal de Estudio E interiorismo y reformas">
                <source src="preview.mp4" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
        </div>
    </main>

    <script defer>
        // Sincronizar videos en desktop
        document.addEventListener('DOMContentLoaded', function() {
            const mainVideo = document.getElementById('videoPlayer');
            const bgVideos = document.querySelectorAll('.video-bg video');

            if (bgVideos.length > 0) {
                bgVideos.forEach(bgVideo => {
                    mainVideo.addEventListener('play', () => bgVideo.play());
                    mainVideo.addEventListener('pause', () => bgVideo.pause());
                    mainVideo.addEventListener('timeupdate', () => {
                        bgVideo.currentTime = mainVideo.currentTime;
                    });
                });
            }
        });

        // Lazy loading para mejorar Core Web Vitals
        document.addEventListener('DOMContentLoaded', function() {
            const videos = document.querySelectorAll('video');
            videos.forEach(video => {
                video.preload = 'metadata';
            });
        });
    </script>
</body>
</html>
