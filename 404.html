<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | estudio e</title>
    <meta name="robots" content="noindex,follow">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        :root {
            --bg: #C5BBAF;
            --bg2: #F2EBD9;
            --text: #26201A;
            --muted: #8A7A6E;
            --line: rgba(100, 85, 70, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { width: 100%; height: 100%; }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .wrap {
            width: min(720px, 100%);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.42);
            padding: 48px 36px;
            text-align: center;
        }

        .code {
            font-size: clamp(56px, 11vw, 110px);
            line-height: 1;
            letter-spacing: 4px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: clamp(24px, 4.5vw, 40px);
            font-weight: 400;
            margin-bottom: 14px;
        }

        p {
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: #7A6656;
            padding: 12px 22px;
            border-radius: 2px;
            letter-spacing: 0.5px;
            transition: background 0.25s ease;
        }

        a:hover {
            background: #665445;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="code">404</div>
        <h1>Página no encontrada</h1>
        <p>La URL solicitada no existe. Si buscabas el sitemap, usa <strong>/sitemap.xml</strong>.</p>
        <a href="/">Volver al inicio</a>
    </main>
</body>
</html>
